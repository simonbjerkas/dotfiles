# =============================================================================
# General
# =============================================================================

# Remap prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support (click to select panes/windows, scroll, resize)
set -g mouse on

# Start window and pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape-key delay (important for neovim)
set -sg escape-time 0

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Cursor style
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[5 q'
set -g cursor-style blinking-bar

# Focus events (lets neovim know when the terminal gains/loses focus)
set -g focus-events on

# =============================================================================
# Keybindings
# =============================================================================

# Reload config with prefix + r
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display "Config reloaded!"

# Vi-style copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Open copy mode with prefix + [, scroll with vim keys (j/k)
# Enter copy mode: prefix + [
# Quit copy mode: q

# Split panes with | and - (more intuitive than " and %)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Open new windows in current directory
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim keys (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys (prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Theme — syntax.lua colors
#   bg:      #111111
#   fg:      #ffffff
#   muted:   #666666
#   gold:    #FABF47
#   cyan:    #00FFF5
#   green:   #BEFF00
# =============================================================================

# Status bar position
set -g status-position bottom
set -g status-interval 5

# Status bar colors
set -g status-style "bg=#111111,fg=#666666"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#FABF47,fg=#111111,bold] #S #[bg=#111111,fg=#FABF47] "

# Right: date and time
set -g status-right-length 60
set -g status-right "#[fg=#666666] %Y-%m-%d #[fg=#FABF47]%H:%M "

# Window tabs
set -g window-status-format " #[fg=#666666]#I #W "
set -g window-status-current-format " #[fg=#FABF47,bold]#I #W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#FABF47"

# Command/message line
set -g message-style "bg=#111111,fg=#FABF47,bold"

# Copy mode highlight
set -g mode-style "bg=#2a2a2a,fg=#ffffff"
